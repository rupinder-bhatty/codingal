<!--
1) Start the HTML document with `<!DOCTYPE html>` and set language as English using `<html lang="en">`.

2) Inside the `<head>` section:
   a) Set the page title: "Bootstrap Jumbotron".
   b) Add `<meta charset="utf-8">` to support special characters.
   c) Add the viewport meta tag for responsive design on mobile devices.
   d) Link Bootstrap 4.3.1 CSS using the CDN link.
      (This provides classes like jumbotron, container, btn, etc.)
   e) Link Bootstrap 4.3.1 JavaScript using the CDN script tag.
      (Note: Jumbotron and button styling work using CSS; JS is for interactive components.)

3) Inside the `<body>` section:
   a) Use `style="text-align:center;"` to center-align all text on the page.

4) Create a Bootstrap Jumbotron:
   a) Use `<div class="jumbotron jumbotron-fluid">`
      - `jumbotron` creates a large highlighted section.
      - `jumbotron-fluid` makes it full-width across the page.
   b) Inside it, use `<div class="container">` to keep content aligned with page margins.

5) Add content inside the jumbotron:
   a) Use an `<h1>` heading with inline style `color:orange;` to make it orange.
   b) Add a paragraph `<p>` describing Codingal.

6) Create a second container below the jumbotron:
   a) Use `<div class="container mt-3">`
      - `container` gives a responsive fixed-width layout.
      - `mt-3` adds margin at the top for spacing.

7) Add a heading "Buttons" using `<h2>`.

8) Create Bootstrap buttons using `<button>` with different classes:
   a) `btn btn-primary` (blue primary button)
   b) `btn btn-secondary` (grey button)
   c) `btn btn-success` (green button)
   d) `btn btn-warning` (yellow/orange button)
   e) `btn btn-danger` (red button)

9) Close all tags properly: close containers, body, and html.
