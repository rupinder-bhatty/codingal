2) Open the `<html>` tag to wrap the entire webpage.

3) Inside the `<head>` section:
   a) Set the page title using `<title>Bootstrap Example</title>`.
   b) Add the viewport meta tag:
      `<meta name="viewport" content="width=device-width, initial-scale=1">`
      to make the page responsive on different devices.
   c) Link Bootstrap 4.5.2 CSS using the CDN link.
      (This provides the spinner styles.)
   d) Link Bootstrap 4.5.2 JavaScript using the CDN script tag.
      (Spinners mainly work with CSS; JS is for interactive components.)

4) Inside the `<body>` section:

5) Create a Bootstrap container using `<div class="container">`:
   a) Adds responsive padding and fixed-width layout.

6) Add a heading `<h2>` titled "Spinners".

7) Add a paragraph explaining spinners:
   a) Use `<code>` to display `.spinner-border` in code-style formatting.

8) Create a spinner using:
   `<div class="spinner-border"></div>`
   a) Bootstrap automatically displays a rotating loader circle.

9) Close the container div, then close the `<body>` and `<html>` tags to finish the page.
